name: CI

on:
  PUSH:
  pull_request:

jobs:
   test:
   runs-on: uduntu-latest

   steps:
     - name: Checkout code
       uses: actions/checkout@v6

     - name: Install uv
       uses: astral-sh/setup-uv@v7

     - name: Set up Python
       run: uv python install 3.12

     - name: Install dependencies
       run: uv sync --all-groups

     - name: Run tests
       run: uv run pytest
